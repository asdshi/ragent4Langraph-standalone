name: RAG Evaluation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install markitdown[pdf]

      - name: Run unit & integration tests
        run: |
          pytest -m "not llm and not e2e" --tb=short

  # ------------------------------------------------------------------
  # 端到端评估任务（需要配置 OPENAI_API_KEY secret 才能启用）
  # ------------------------------------------------------------------
  evaluate:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && secrets.OPENAI_API_KEY != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install markitdown[pdf]

      - name: Run benchmark
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python benchmark_rag.py

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark_report_*.json

      # 若 benchmark 生成了 eval_report，可在此添加阈值检查
