# Modular RAG MCP Server - Configuration
# This is the main configuration file for the MCP Server.
# Edit this file to configure LLM, Embedding, VectorStore, and other services.

# =============================================================================
# LLM Configuration
# =============================================================================
llm:
  provider: "openai"
  model: "qwen3.5-omni-flash"  # 阿里云百炼模型
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # api_key 会从 OPENAI_API_KEY 环境变量自动读取
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration
# =============================================================================
embedding:
  provider: "openai"
  model: "text-embedding-v3"  # 阿里云百炼 Embedding 模型
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # api_key 会从 OPENAI_API_KEY 环境变量自动读取
  dimensions: 1536
  # OpenAI-specific settings (if provider is openai):
  # api_key: "YOUR_API_KEY_HERE"

# =============================================================================
# Vision LLM Configuration (for Image Captioning)
# =============================================================================
vision_llm:
  enabled: true
  provider: "openai"
  model: "qwen3.5-omni-flash"  # 复用全模态模型做 OCR / 图片理解
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # api_key 会从 OPENAI_API_KEY 环境变量自动读取
  # Ollama-specific settings (if provider is ollama):
  # base_url: "http://localhost:11434"
  max_image_size: 2048  # Max dimension (width/height) for image compression

# =============================================================================
# Vector Store Configuration
# =============================================================================
vector_store:
  provider: "chroma"  # Options: chroma, qdrant, pinecone
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60  # RRF constant

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: true
  provider: "dashscope"  # Options: none, cross_encoder, dashscope, llm
  model: "qwen3-rerank"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false
  provider: "custom"  # Options: ragas, deepeval, custom
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"  # Options: recursive, semantic, fixed_length
  batch_size: 100
  max_workers: 3  # Transform 阶段 LLM 调用的最大并发数
  
  # Chunk Refiner Configuration (C5)
  chunk_refiner:
    use_llm: true  # Set to true to enable LLM-based refinement (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based refinement
  
  # Metadata Enricher Configuration (C6)
  metadata_enricher:
    use_llm: true  # Set to true to enable LLM-based enrichment (requires LLM config)
    # When use_llm is false or LLM call fails, falls back to rule-based enrichment

# =============================================================================
# MCP Client Configuration (External Tool Servers)
# =============================================================================
mcp_servers:
  # Example: Tavily Web Search MCP Server
  # tavily:
  #   transport: sse
  #   url: "http://localhost:3000/sse"
  #   timeout_seconds: 30
  
  # Example: Filesystem MCP Server
  # filesystem:
  #   transport: stdio
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  #   timeout_seconds: 30
